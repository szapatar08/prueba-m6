# Local development environment — all services on a single bridge network.
# For staging/production, use environment variables or a secrets manager.
services:
  postgres:
    image: postgres:16
    container_name: prueba-postgres
    environment:
      POSTGRES_DB: prueba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prueba-net

  redis:
    image: redis:7-alpine
    container_name: prueba-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prueba-net

  minio:
    image: minio/minio
    container_name: prueba-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prueba-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: prueba-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-DevSecretKeyThatIsAtLeast32CharactersLongForDev!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prueba-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prueba-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://api:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - prueba-net

networks:
  prueba-net:
    driver: bridge

volumes:
  pgdata:
  miniodata:
  frontend_node_modules:
